<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBAR Patient Handoff - Internal Medicine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background-color: #f1f5f9; }
        .sbar-card { transition: all 0.3s ease; }
        .sbar-card:focus-within { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        textarea { resize: none; }
        @media (max-width: 640px) { .container { padding: 10px; } }
    </style>
</head>
<body class="pb-20">

    <div class="bg-slate-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl flex items-center">
                <span class="bg-blue-600 px-2 py-1 rounded mr-2 text-sm">SBAR</span>
                Bàn Giao Trực
            </h1>
            <button onclick="clearAll()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded transition">Xóa trắng</button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto container mt-6 space-y-4">
        
        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-slate-400 grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="col-span-1">
                <label class="block text-[10px] font-bold text-slate-500 uppercase">Họ tên BN</label>
                <input type="text" id="p_name" class="w-full font-bold text-slate-800 focus:outline-none border-b border-transparent focus:border-blue-500" placeholder="NGUYỄN VĂN A">
            </div>
            <div class="col-span-1">
                <label class="block text-[10px] font-bold text-slate-500 uppercase">Giường/Phòng</label>
                <input type="text" id="p_bed" class="w-full font-bold text-blue-600 focus:outline-none border-b border-transparent focus:border-blue-500" placeholder="G12-P401">
            </div>
            <div class="col-span-2 md:col-span-2">
                <label class="block text-[10px] font-bold text-slate-500 uppercase">Chẩn đoán chính</label>
                <input type="text" id="p_dx" class="w-full font-medium text-slate-700 focus:outline-none border-b border-transparent focus:border-blue-500" placeholder="VD: Viêm phổi/ĐTĐ type 2">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <div class="sbar-card bg-white p-4 rounded-xl shadow-sm border-t-4 border-red-500">
                <h2 class="text-red-600 font-bold flex items-center mb-2">
                    <span class="w-6 h-6 rounded-full bg-red-100 flex items-center justify-center mr-2 text-xs">S</span>
                    SITUATION (Tình trạng hiện tại)
                </h2>
                <textarea id="s_val" rows="3" class="w-full text-sm bg-slate-50 p-2 rounded border border-slate-100 focus:bg-white focus:border-red-300 outline-none" placeholder="- BN khó thở tăng dần, SpO2 90% khí trời..."></textarea>
            </div>

            <div class="sbar-card bg-white p-4 rounded-xl shadow-sm border-t-4 border-blue-500">
                <h2 class="text-blue-600 font-bold flex items-center mb-2">
                    <span class="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center mr-2 text-xs">B</span>
                    BACKGROUND (Tiền sử/Bệnh sử)
                </h2>
                <textarea id="b_val" rows="3" class="w-full text-sm bg-slate-50 p-2 rounded border border-slate-100 focus:bg-white focus:border-blue-300 outline-none" placeholder="- Tiền sử COPD 5 năm, bỏ thuốc 1 tuần..."></textarea>
            </div>

            <div class="sbar-card bg-white p-4 rounded-xl shadow-sm border-t-4 border-orange-500">
                <h2 class="text-orange-600 font-bold flex items-center mb-2">
                    <span class="w-6 h-6 rounded-full bg-orange-100 flex items-center justify-center mr-2 text-xs">A</span>
                    ASSESSMENT (Đánh giá)
                </h2>
                <textarea id="a_val" rows="3" class="w-full text-sm bg-slate-50 p-2 rounded border border-slate-100 focus:bg-white focus:border-orange-300 outline-none" placeholder="- Đợt cấp COPD mức độ trung bình, chưa loại trừ VP..."></textarea>
            </div>

            <div class="sbar-card bg-white p-4 rounded-xl shadow-sm border-t-4 border-green-600">
                <h2 class="text-green-600 font-bold flex items-center mb-2">
                    <span class="w-6 h-6 rounded-full bg-green-100 flex items-center justify-center mr-2 text-xs">R</span>
                    RECOMMENDATION (Đề nghị)
                </h2>
                <textarea id="r_val" rows="3" class="w-full text-sm bg-slate-50 p-2 rounded border border-slate-100 focus:bg-white focus:border-green-300 outline-none" placeholder="- Thở Oxy 2L/p, khí dung Combivent mỗi 4h..."></textarea>
            </div>

        </div>

        <div class="bg-slate-800 rounded-xl p-5 text-white">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Nội dung bàn giao</h3>
                <button onclick="copyHandoff()" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2 px-4 rounded-lg shadow-lg transition">COPY NỘI DUNG</button>
            </div>
            <div id="handoffPreview" class="text-xs font-mono leading-relaxed text-slate-300 bg-black/30 p-4 rounded-lg whitespace-pre-wrap min-h-[100px]">Vui lòng nhập thông tin...</div>
        </div>

    </div>

    <script>
        const inputs = ['p_name', 'p_bed', 'p_dx', 's_val', 'b_val', 'a_val', 'r_val'];
        
        // Cập nhật preview tự động
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', updatePreview);
        });

        function updatePreview() {
            const data = {};
            inputs.forEach(id => data[id] = document.getElementById(id).value);

            let text = `[BÀN GIAO BỆNH NHÂN - SBAR]\n`;
            text += `📍 BN: ${data.p_name || '...'} | Giường: ${data.p_bed || '...'}\n`;
            text += `📋 Chẩn đoán: ${data.p_dx || '...'}\n`;
            text += `---------------------------\n`;
            text += `(S): ${data.s_val || '...'}\n`;
            text += `(B): ${data.b_val || '...'}\n`;
            text += `(A): ${data.a_val || '...'}\n`;
            text += `(R): ${data.r_val || '...'}\n`;
            text += `---------------------------\n`;
            text += `Thời gian: ${new Date().toLocaleString('vi-VN')}`;

            document.getElementById('handoffPreview').textContent = text;
        }

        function copyHandoff() {
            const content = document.getElementById('handoffPreview').textContent;
            navigator.clipboard.writeText(content).then(() => {
                alert('Đã copy nội dung bàn giao!');
            });
        }

        function clearAll() {
            if(confirm('Bạn có muốn xóa toàn bộ nội dung?')) {
                inputs.forEach(id => document.getElementById(id).value = '');
                updatePreview();
            }
        }
    </script>
</body>
</html>
