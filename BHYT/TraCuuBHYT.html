<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu BHYT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
    /* ===================== DESIGN TOKENS ===================== */
    :root, [data-theme="light"] {
      --color-bg:             #f7f6f2;
      --color-surface:        #ffffff;
      --color-surface-2:      #f9f8f5;
      --color-surface-offset: #f0eeea;
      --color-divider:        #e2dfd8;
      --color-border:         #d4d1ca;
      --color-text:           #1e1c18;
      --color-text-muted:     #6b6a66;
      --color-text-faint:     #aaa9a4;
      --color-primary:        #017a7a;
      --color-primary-hover:  #015f5f;
      --color-primary-tint:   #e0f2f2;
      --color-blue:           #1a6faa;
      --color-blue-tint:      #deeef8;
      --color-amber:          #b45309;
      --color-amber-tint:     #fef3c7;
      --color-purple:         #6d35b8;
      --color-purple-tint:    #ede8f8;
      --color-success:        #2e6b13;
      --color-success-tint:   #dff0d7;
      --color-error:          #c0392b;
      --color-error-tint:     #fdecea;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
      --shadow-md: 0 4px 14px rgba(0,0,0,0.09);
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px; --radius-full: 9999px;
      --font-body: 'Inter', 'Helvetica Neue', sans-serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.5vw,  1.375rem);
      --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);
    }
    [data-theme="dark"] {
      --color-bg:#131210; --color-surface:#1a1917; --color-surface-2:#1f1e1c;
      --color-surface-offset:#252421; --color-divider:#2e2c2a; --color-border:#3a3835;
      --color-text:#e8e6e2; --color-text-muted:#8a8884; --color-text-faint:#5a5957;
      --color-primary:#2ea8a8; --color-primary-hover:#1d8888; --color-primary-tint:#1a3535;
      --color-blue:#5a9fd4; --color-blue-tint:#1a2d3d;
      --color-amber:#e09a30; --color-amber-tint:#2e2010;
      --color-purple:#9b6fe0; --color-purple-tint:#261a38;
      --color-success:#5aaa36; --color-success-tint:#1a2e10;
      --color-error:#e05a4a; --color-error-tint:#2e1510;
      --shadow-sm:0 1px 3px rgba(0,0,0,0.3); --shadow-md:0 4px 14px rgba(0,0,0,0.45);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --color-bg:#131210; --color-surface:#1a1917; --color-surface-2:#1f1e1c;
        --color-surface-offset:#252421; --color-divider:#2e2c2a; --color-border:#3a3835;
        --color-text:#e8e6e2; --color-text-muted:#8a8884; --color-text-faint:#5a5957;
        --color-primary:#2ea8a8; --color-primary-hover:#1d8888; --color-primary-tint:#1a3535;
        --color-blue:#5a9fd4; --color-blue-tint:#1a2d3d;
        --color-amber:#e09a30; --color-amber-tint:#2e2010;
        --color-purple:#9b6fe0; --color-purple-tint:#261a38;
        --color-success:#5aaa36; --color-success-tint:#1a2e10;
        --color-error:#e05a4a; --color-error-tint:#2e1510;
        --shadow-sm:0 1px 3px rgba(0,0,0,0.3); --shadow-md:0 4px 14px rgba(0,0,0,0.45);
      }
    }

    /* ===================== BASE ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: none; text-size-adjust: none; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body { font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text); background: var(--color-bg); min-height: 100dvh; line-height: 1.6; transition: background var(--transition), color var(--transition); }
    img, svg { display: block; max-width: 100%; }
    button, input, select { font: inherit; color: inherit; }
    button { cursor: pointer; border: none; background: none; }
    a, button, input, select { transition: color var(--transition), background var(--transition), border-color var(--transition), box-shadow var(--transition); }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }

    /* ===================== HEADER ===================== */
    .app-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-divider);
      box-shadow: var(--shadow-sm);
      padding: 0 clamp(1rem, 4vw, 2rem);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 0; gap: 1rem;
    }
    .logo-wrap { display: flex; align-items: center; gap: 0.625rem; text-decoration: none; }
    .logo-icon { width: 34px; height: 34px; flex-shrink: 0; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.2; }
    .logo-title { font-size: var(--text-sm); font-weight: 700; color: var(--color-primary); letter-spacing: -0.01em; }
    .logo-sub { font-size: var(--text-xs); color: var(--color-text-muted); }
    .theme-toggle {
      width: 36px; height: 36px; border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-muted); background: var(--color-surface-offset);
      flex-shrink: 0;
    }
    .theme-toggle:hover { color: var(--color-text); background: var(--color-divider); }

    /* ===================== TABS ===================== */
    .nav-tabs {
      display: flex; overflow-x: auto; scrollbar-width: none;
      border-top: 1px solid var(--color-divider);
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex-shrink: 0; display: flex; align-items: center; gap: 0.4rem;
      padding: 0.65rem 1.1rem; font-size: var(--text-sm); font-weight: 500;
      color: var(--color-text-muted); border-bottom: 2px solid transparent;
      white-space: nowrap; position: relative; top: 1px;
    }
    .tab-btn:hover { color: var(--color-text); background: var(--color-surface-offset); }
    .tab-btn.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: 600; }

    /* Tab accent colors */
    .tab-btn[data-tab="thuoc"].active       { color: var(--color-primary);  border-bottom-color: var(--color-primary); }
    .tab-btn[data-tab="xetnghiem"].active   { color: var(--color-blue);     border-bottom-color: var(--color-blue); }
    .tab-btn[data-tab="dvkt"].active        { color: var(--color-purple);   border-bottom-color: var(--color-purple); }

    /* ===================== MAIN ===================== */
    .app-main { max-width: 880px; margin: 0 auto; padding: clamp(1rem, 3vw, 1.75rem) clamp(1rem, 4vw, 1.5rem) 5rem; }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeUp 0.18s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

    /* ===================== SEARCH ===================== */
    .search-wrap { position: relative; margin-bottom: 1.1rem; }
    .search-icon {
      position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%);
      color: var(--color-text-faint); pointer-events: none; width: 17px; height: 17px;
    }
    .search-input {
      width: 100%; padding: 0.75rem 1rem 0.75rem 2.6rem;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md); font-size: var(--text-base);
      background: var(--color-surface); outline: none; box-shadow: var(--shadow-sm);
    }
    .search-input::placeholder { color: var(--color-text-faint); }
    .search-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-primary) 15%, transparent);
    }
    /* Per-tab focus colors */
    .tab-content[data-tab="xetnghiem"] .search-input:focus {
      border-color: var(--color-blue);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-blue) 15%, transparent);
    }
    .tab-content[data-tab="dvkt"] .search-input:focus {
      border-color: var(--color-purple);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-purple) 15%, transparent);
    }

    /* ===================== RESULT META ===================== */
    .result-meta { font-size: var(--text-xs); color: var(--color-text-muted); margin-bottom: 0.75rem; padding-left: 0.2rem; }

    /* ===================== CARDS ===================== */
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-divider);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 0.625rem;
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition), border-color var(--transition);
    }
    .card:hover { box-shadow: var(--shadow-md); }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.625rem; }
    .card-title  { font-size: var(--text-base); font-weight: 600; color: var(--color-text); line-height: 1.3; }
    .card-badges { display: flex; gap: 0.375rem; flex-wrap: wrap; flex-shrink: 0; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 0.2rem 0.6rem; font-size: var(--text-xs); font-weight: 500;
      border-radius: var(--radius-sm); white-space: nowrap; line-height: 1.4;
    }
    .badge-teal   { background: var(--color-primary-tint); color: var(--color-primary); }
    .badge-blue   { background: var(--color-blue-tint);    color: var(--color-blue); }
    .badge-purple { background: var(--color-purple-tint);  color: var(--color-purple); }
    .badge-gray   { background: var(--color-surface-offset); color: var(--color-text-muted); }

    .icd-pill {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.35rem 0.7rem;
      background: var(--color-surface-2);
      border: 1px solid var(--color-divider);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm); font-family: var(--font-mono); font-weight: 600;
      margin-bottom: 0.625rem;
    }
    .icd-pill .icd-label { font-family: var(--font-body); font-weight: 400; font-size: var(--text-xs); color: var(--color-text-muted); }

    .card-body { font-size: var(--text-sm); color: var(--color-text-muted); line-height: 1.65; }
    .card-body b { color: var(--color-text); font-weight: 600; }

    .alert {
      display: flex; gap: 0.5rem; align-items: flex-start;
      padding: 0.575rem 0.8rem;
      border-radius: var(--radius-sm);
      font-size: var(--text-xs); margin-top: 0.625rem; line-height: 1.55;
    }
    .alert-warning { background: var(--color-amber-tint);  color: var(--color-amber);  border: 1px solid color-mix(in oklch, var(--color-amber)  28%, transparent); }
    .alert-icon { flex-shrink: 0; margin-top: 0.05rem; }

    /* ===================== EMPTY ===================== */
    .empty-state { text-align: center; padding: 3rem 1.5rem; color: var(--color-text-muted); }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.45; }
    .empty-state p { font-size: var(--text-sm); max-width: 32ch; margin: 0 auto; }

    /* ===================== MOBILE ===================== */
    @media (max-width: 540px) {
      .logo-sub { display: none; }
      .tab-btn  { padding: 0.6rem 0.8rem; font-size: var(--text-xs); }
      .card     { padding: 0.875rem 1rem; }
    }

    /* ===================== SCROLLBAR ===================== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-divider); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-border); }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-top">
    <a class="logo-wrap" href="#">
      <svg class="logo-icon" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Logo BHYT">
        <rect width="34" height="34" rx="9" fill="var(--color-primary)"/>
        <path d="M17 8v18M8 17h18" stroke="white" stroke-width="3" stroke-linecap="round"/>
        <circle cx="17" cy="17" r="6" stroke="white" stroke-width="1.5" stroke-dasharray="3 2" fill="none" opacity="0.55"/>
      </svg>
      <div class="logo-text">
        <span class="logo-title">Giám định BHYT</span>
        <span class="logo-sub">Hệ thống tra cứu chuyên nghiệp</span>
      </div>
    </a>
    <button class="theme-toggle" data-theme-toggle aria-label="Chuyển chế độ tối/sáng">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <nav class="nav-tabs" role="tablist">
    <button class="tab-btn active" data-tab="thuoc" role="tab" aria-selected="true" onclick="switchTab('thuoc', this)">
      💊 Thuốc
    </button>
    <button class="tab-btn" data-tab="xetnghiem" role="tab" aria-selected="false" onclick="switchTab('xetnghiem', this)">
      🧪 Xét nghiệm
    </button>
    <button class="tab-btn" data-tab="dvkt" role="tab" aria-selected="false" onclick="switchTab('dvkt', this)">
      🩺 Dịch vụ kỹ thuật
    </button>
  </nav>
</header>

<!-- MAIN -->
<main class="app-main">

  <!-- TAB: THUỐC -->
  <div id="tab-thuoc" class="tab-content active" data-tab="thuoc" role="tabpanel">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-thuoc" class="search-input" placeholder="Tìm tên thuốc, hoạt chất, mã ICD..." autocomplete="off" spellcheck="false">
    </div>
    <div class="result-meta" id="meta-thuoc"></div>
    <div id="result-thuoc"></div>
  </div>

  <!-- TAB: XÉT NGHIỆM -->
  <div id="tab-xetnghiem" class="tab-content" data-tab="xetnghiem" role="tabpanel">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-xetnghiem" class="search-input" placeholder="Tìm tên xét nghiệm, mã ICD..." autocomplete="off" spellcheck="false">
    </div>
    <div class="result-meta" id="meta-xetnghiem"></div>
    <div id="result-xetnghiem"></div>
  </div>

  <!-- TAB: DVKT -->
  <div id="tab-dvkt" class="tab-content" data-tab="dvkt" role="tabpanel">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-dvkt" class="search-input" placeholder="Tìm tên dịch vụ kỹ thuật, mã ICD..." autocomplete="off" spellcheck="false">
    </div>
    <div class="result-meta" id="meta-dvkt"></div>
    <div id="result-dvkt"></div>
  </div>

</main>

<script src="data_dieukien.js"></script>

<script>
// ── Theme toggle ───────────────────────────────────────────────
(function(){
  const btn = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  let dark = matchMedia('(prefers-color-scheme: dark)').matches;
  function apply() {
    root.setAttribute('data-theme', dark ? 'dark' : 'light');
    btn.innerHTML = dark
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    btn.setAttribute('aria-label', dark ? 'Chuyển sang chế độ sáng' : 'Chuyển sang chế độ tối');
  }
  apply();
  btn.addEventListener('click', () => { dark = !dark; apply(); });
})();

// ── Helpers ────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function empty(msg){
  return `<div class="empty-state"><div class="empty-state-icon">🔍</div><p>${msg}</p></div>`;
}

function setMeta(id, count, total){
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = count === total
    ? `${count} kết quả`
    : `Hiển thị ${count} / ${total} kết quả`;
}

function cardHTML(item, badgeClass, badgeLabel){
  return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${esc(item.ten)}</div>
        <div class="card-badges">
          ${item.nguon ? `<span class="badge badge-gray">${esc(item.nguon)}</span>` : ''}
          <span class="badge ${badgeClass}">${badgeLabel}</span>
        </div>
      </div>
      <div class="icd-pill">
        <span class="icd-label">Mã ICD:</span>${esc(item.ma_icd)}
      </div>
      <div class="card-body"><b>Điều kiện:</b> ${esc(item.dieu_kien)}</div>
      ${item.ghi_chu ? `<div class="alert alert-warning"><span class="alert-icon">⚠️</span><span>${esc(item.ghi_chu)}</span></div>` : ''}
    </div>`;
}

// ── Tab switching ──────────────────────────────────────────────
function switchTab(tabId, el){
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
  document.getElementById('tab-' + tabId).classList.add('active');
  el.classList.add('active'); el.setAttribute('aria-selected','true');
}

// ── Render functions ───────────────────────────────────────────
function renderTab(loai, resultId, metaId, searchId, badgeClass, badgeLabel, emptyMsg){
  if (typeof dataDieuKien === 'undefined') return;
  const q = document.getElementById(searchId).value.toLowerCase().trim();
  const pool = dataDieuKien.filter(i => i.loai === loai);
  const filtered = pool.filter(i =>
    (i.ten||'').toLowerCase().includes(q) ||
    (i.ma_icd||'').toLowerCase().includes(q) ||
    (i.dieu_kien||'').toLowerCase().includes(q)
  );
  setMeta(metaId, filtered.length, pool.length);
  document.getElementById(resultId).innerHTML = filtered.length
    ? filtered.map(item => cardHTML(item, badgeClass, badgeLabel)).join('')
    : empty(emptyMsg);
}

function renderThuoc()      { renderTab('Thuốc',    'result-thuoc',     'meta-thuoc',     'search-thuoc',     'badge-teal',   '💊 Thuốc',    'Không tìm thấy thuốc phù hợp.'); }
function renderXetNghiem()  { renderTab('Xét nghiệm','result-xetnghiem','meta-xetnghiem', 'search-xetnghiem', 'badge-blue',   '🧪 Xét nghiệm','Không tìm thấy xét nghiệm phù hợp.'); }
function renderDVKT()       { renderTab('DVKT',      'result-dvkt',      'meta-dvkt',      'search-dvkt',      'badge-purple', '🩺 DVKT',     'Không tìm thấy dịch vụ kỹ thuật phù hợp.'); }

// ── Init ───────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  renderThuoc();
  renderXetNghiem();
  renderDVKT();
  document.getElementById('search-thuoc').addEventListener('input', renderThuoc);
  document.getElementById('search-xetnghiem').addEventListener('input', renderXetNghiem);
  document.getElementById('search-dvkt').addEventListener('input', renderDVKT);
});
</script>
</body>
</html>
