<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Shadows & Gradients -->
    <filter id="drop-shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.08" />
    </filter>
    <linearGradient id="tbw-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="icf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="ecf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="isf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="plasma-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 18px; fill: #1e293b; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; font-size: 13px; fill: #64748b; }
    .card-title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 15px; fill: #ffffff; }
    .card-meta { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 18px; fill: #ffffff; }
    .card-body { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 11px; fill: #f1f5f9; }
    .card-ion { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 11px; fill: #ffffff; }
    .arrow-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 11px; fill: #475569; text-anchor: middle; }
    
    @media (prefers-color-scheme: dark) {
      .title { fill: #f8fafc; }
      .subtitle { fill: #94a3b8; }
      .arrow-text { fill: #94a3b8; }
    }
  </style>

  <!-- BACKGROUND BRACKET / TOTAL BODY WEIGHT -->
  <rect x="15" y="15" width="770" height="420" rx="16" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 4" />
  <text x="35" y="38" class="title">TRỌNG LƯỢNG CƠ THỂ (BODY WEIGHT - 100%)</text>
  <text x="35" y="56" class="subtitle">Quy tắc phân chia khoang dịch sinh lý học lâm sàng (60 - 40 - 20)</text>

  <!-- 1. TOTAL BODY WATER (TBW) OUTER CONTAINER -->
  <g filter="url(#drop-shadow)">
    <rect x="35" y="80" width="730" height="335" rx="14" fill="url(#tbw-grad)" />
    <!-- Header of TBW -->
    <text x="55" y="112" class="card-title" font-size="16px">TỔNG LƯỢNG NƯỚC CƠ THỂ (TBW)</text>
    <text x="745" y="112" class="card-meta" text-anchor="end">60% Trọng lượng cơ thể</text>
    <text x="55" y="130" class="card-body">Chiếm ~42 Lít ở nam giới 70kg • Dung môi hòa tan tất cả các chất sinh hóa</text>
  </g>

  <!-- 2. INTRACELLULAR FLUID (ICF) -->
  <g filter="url(#drop-shadow)">
    <rect x="55" y="155" width="310" height="240" rx="10" fill="url(#icf-grad)" />
    <text x="75" y="185" class="card-title">Dịch Nội Bào (ICF)</text>
    <text x="75" y="210" class="card-meta">40% Trọng lượng</text>
    <text x="345" y="210" class="card-meta" text-anchor="end">2/3 TBW</text>
    
    <line x1="75" y1="230" x2="345" y2="230" stroke="#ffffff" stroke-width="1" stroke-opacity="0.3" />
    
    <text x="75" y="255" class="card-body">Chất dịch bên trong màng tế bào (~28 Lít)</text>
    <text x="75" y="275" class="card-body">Duy trì thể tích tế bào và áp suất thẩm thấu</text>
    
    <rect x="75" y="305" width="270" height="65" rx="6" fill="#000000" fill-opacity="0.15" />
    <text x="90" y="325" class="card-ion">Ion chính:</text>
    <text x="90" y="348" class="card-body" font-weight="600" fill="#a7f3d0">Kali (K⁺), Magiê (Mg²⁺), Phosphates</text>
  </g>

  <!-- 3. EXTRACELLULAR FLUID (ECF) -->
  <g filter="url(#drop-shadow)">
    <rect x="385" y="155" width="380" height="240" rx="10" fill="url(#ecf-grad)" />
    <text x="405" y="185" class="card-title">Dịch Ngoại Bào (ECF)</text>
    <text x="405" y="210" class="card-meta">20% Trọng lượng</text>
    <text x="745" y="210" class="card-meta" text-anchor="end">1/3 TBW</text>
    
    <!-- SUB-DIVISIONS WITHIN ECF (ISF & PLASMA) -->
    <!-- Interstitial Fluid (ISF) Card -->
    <g filter="url(#drop-shadow)">
      <rect x="400" y="235" width="220" height="145" rx="8" fill="url(#isf-grad)" />
      <text x="415" y="260" class="card-title" font-size="13px">Dịch Kẽ (ISF)</text>
      <text x="415" y="280" class="card-meta" font-size="15px">15%</text>
      <text x="605" y="280" class="card-meta" font-size="14px" text-anchor="end">3/4 ECF</text>
      <text x="415" y="305" class="card-body">Bao quanh tế bào, nằm</text>
      <text x="415" y="320" class="card-body">ngoài lòng mạch (~10.5 Lít)</text>
      <text x="415" y="355" class="card-ion" font-size="10px" fill="#ddd6fe">Ion chính: Na⁺, Cl⁻, HCO₃⁻</text>
    </g>

    <!-- Plasma Card -->
    <g filter="url(#drop-shadow)">
      <rect x="635" y="235" width="115" height="145" rx="8" fill="url(#plasma-grad)" />
      <text x="645" y="260" class="card-title" font-size="13px">Huyết Tương</text>
      <text x="645" y="280" class="card-meta" font-size="15px">5%</text>
      <text x="740" y="280" class="card-meta" font-size="14px" text-anchor="end">1/4 ECF</text>
      <text x="645" y="305" class="card-body">Nằm trong</text>
      <text x="645" y="320" class="card-body">lòng mạch (~3.5 L)</text>
      <text x="645" y="355" class="card-ion" font-size="10px" fill="#fecdd3">Giàu Proteins</text>
    </g>
  </g>

  <!-- CONNECTIONS & LABELS -->
  <path d="M 370,275 L 380,275" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5" />
</svg>
